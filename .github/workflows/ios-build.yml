name: Build Black Box For iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Set iOS Deployment Target to 13.0
        run: |
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '13.0'/" ios/Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS Simulator
        run: flutter build ios --simulator --debug

      - name: Create Simulator ZIP          # ✅ Fixed
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../app.zip Runner.app

      - name: Upload Simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: app.zip